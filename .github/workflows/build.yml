name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  java_version: '17'
  java_distribution: 'zulu'

jobs:
  maven-build:
    name: Maven build, test and code-style check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up JDK ${{ env.java_version }}-${{ env.java_distribution }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.java_version }}
          distribution: ${{ env.java_distribution }}
      - name: Print Java and Maven versions
        run: mvn --version
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
            ${{ runner.os }}-maven-
            ${{ runner.os }}-
      # `mvn verify` runs the OpenAPI generation, compilation, the integration
      # tests and the Spotless (google-java-format) code-style check.
      - name: Run Maven build
        run: mvn --batch-mode -ntp clean verify
      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gtfs-validator-api-jar
          path: target/*.jar
          if-no-files-found: warn
