spring.application.name=gtfs-validator-api

# API base path is /v2 (matches the OpenAPI servers entry).
openapi.gTFSValidator.base-path=/v2

# Response compression (validation reports can be large).
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,text/html

# Upload size is unlimited by default (the schema does not mandate a limit).
# Operators can cap it by setting both properties below to a concrete size,
# and advertise it via gtfs.validator.limits.max-upload-bytes.
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1

# Reported by GET /v2/metadata (limits object). Unset by default, so no limit is
# advertised. Set this (and the multipart limits above) to enforce/announce a cap.
# gtfs.validator.limits.max-upload-bytes=
# gtfs.validator.limits.max-requests-per-minute=

# Serve the OpenAPI spec (single source of truth: docs/GTFSValidatorAPI.yaml, copied
# into the jar's static resources at build time) and Swagger UI.
springdoc.swagger-ui.url=/GTFSValidatorAPI.yaml
springdoc.api-docs.enabled=true

logging.level.org.mobilitydata.gtfsvalidator.api=INFO
